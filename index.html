<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E" />
    <title>Rumah Off — Tutup Lampu Sebelum Keluar</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100vh; height: 100dvh; overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; color: #fff; }
      canvas { display: block; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
      #hud {
        position: fixed;
        top: calc(12px + env(safe-area-inset-top));
        left: calc(12px + env(safe-area-inset-left));
        padding: 10px 14px; background: rgba(0,0,0,0.55);
        border-radius: 8px; font-size: 14px; line-height: 1.5;
        pointer-events: none; backdrop-filter: blur(4px);
      }
      #hud .big { font-size: 22px; font-weight: 600; }
      #hud .dim { opacity: 0.65; font-size: 12px; }
      #prompt {
        position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
        padding: 10px 18px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 8px; font-size: 16px; display: none;
      }
      #prompt kbd {
        background: #fff; color: #000; padding: 2px 7px; border-radius: 4px;
        font-family: ui-monospace, monospace; font-size: 13px; margin-right: 6px;
      }
      #topright {
        position: fixed;
        top: calc(12px + env(safe-area-inset-top));
        right: calc(12px + env(safe-area-inset-right));
        display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
        pointer-events: none;
      }
      #map {
        width: 160px; height: 128px; display: block;
        border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.45);
      }
      #compass {
        padding: 6px 11px; background: rgba(0,0,0,0.55);
        border-radius: 8px; font-size: 13px;
      }
      @media (max-width: 560px) {
        #map { width: 116px; height: 93px; }
        #compass { font-size: 11px; padding: 5px 9px; }
      }
      #win {
        position: fixed; inset: 0; display: none;
        flex-direction: column; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.85); text-align: center; gap: 16px;
      }
      #win h1 { font-size: 42px; margin: 0; }
      #win p { font-size: 18px; margin: 0; opacity: 0.85; }
      #win button {
        font-size: 16px; padding: 10px 24px; cursor: pointer;
        background: #f4c39b; color: #2a1810; border: 0; border-radius: 6px;
        font-weight: 600;
      }
      #win button:hover { background: #ffd6b0; }

      /* ---------- Mobile touch controls (hidden until a touch is detected) ---------- */
      #touch { display: none; }
      body.touch #touch { display: block; }
      body.gameover #touch { display: none; }
      /* On touch devices, swap the keyboard hint for the touch hint, and drop the "E" key chip */
      body.touch #hud .dim { display: none; }
      .touchHint { display: none; }
      body.touch .touchHint { display: block; opacity: 0.65; font-size: 12px; }
      body.touch #prompt kbd { display: none; }

      #joy {
        position: fixed;
        left: calc(22px + env(safe-area-inset-left));
        bottom: calc(26px + env(safe-area-inset-bottom));
        width: 130px; height: 130px; border-radius: 50%;
        background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.30);
        touch-action: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
      }
      #joyNub {
        position: absolute; left: 50%; top: 50%; width: 56px; height: 56px;
        margin: -28px 0 0 -28px; border-radius: 50%;
        background: rgba(255,255,255,0.32); border: 1px solid rgba(255,255,255,0.45);
        transition: background 0.1s; -webkit-touch-callout: none;
      }
      #interact {
        position: fixed;
        right: calc(26px + env(safe-area-inset-right));
        bottom: calc(40px + env(safe-area-inset-bottom));
        width: 92px; height: 92px; border-radius: 50%;
        background: rgba(244,195,155,0.22); border: 2px solid rgba(244,195,155,0.7);
        color: #ffe2c4; font-size: 30px; font-weight: 700;
        display: flex; align-items: center; justify-content: center;
        touch-action: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        opacity: 0.4; pointer-events: none; transition: opacity 0.12s, background 0.12s;
      }
      #interact.live { opacity: 1; pointer-events: auto; }
      #interact.live:active { background: rgba(244,195,155,0.5); }

      @media (max-width: 560px) {
        #hud { font-size: 12px; padding: 8px 11px; }
        #hud .big { font-size: 18px; }
        #compass { font-size: 11px; padding: 6px 9px; }
        #win h1 { font-size: 32px; }
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div class="big">Tutup <span id="count">0</span>/<span id="total">0</span></div>
      <div>⏱ <span id="timer">0:00</span></div>
      <div class="dim">WASD move · move mouse / arrow keys to look · click locks · scroll zoom · E switch off</div>
      <div class="touchHint">Stik = gerak · seret skrin = pandang · cubit = zum · butang = tutup</div>
    </div>
    <div id="topright">
      <canvas id="map" width="160" height="128"></canvas>
      <div id="compass">📍 <span id="room">—</span></div>
    </div>
    <div id="prompt"><kbd>E</kbd><span id="promptText"></span></div>
    <div id="win">
      <h1>🌙 Selamat tinggal!</h1>
      <p>Semua tertutup dalam <span id="winTime">0:00</span></p>
      <button id="restart">Main lagi</button>
    </div>
    <div id="touch">
      <div id="joy"><div id="joyNub"></div></div>
      <div id="interact">E</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
